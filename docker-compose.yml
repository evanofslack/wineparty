services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-wine123}"
      WINES_FILE: "config/wines.yaml"
      GAMES_FILE: "config/games.yaml"
      STATE_FILE: "/data/state.json"
    volumes:
      - ./config:/app/config:ro
      - wineparty-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    environment:
      WS_PROXY_TARGET: "ws://backend:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  wineparty-data:
