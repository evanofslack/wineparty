services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-wine123}"
      WINES_FILE: "config/wines.yaml"
      GAMES_FILE: "config/games.yaml"
      STATE_FILE: "/data/state.json"
    volumes:
      - ./config:/app/config:ro
      - wineparty-data:/data
    restart: unless-stopped

volumes:
  wineparty-data:
